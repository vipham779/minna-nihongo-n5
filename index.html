<script>
const SPEAK_ICON = `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>`;
const STOP_ICON  = `<svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>`;

// ===== Text-to-speech with tiered quality =====
// Tier 1 (best): Google Translate TTS endpoint - very natural neural voice, free, no API key
// Tier 2 (fallback): Web Speech API with best-available system voice
// Tier 3 (last resort): Default system voice
let japaneseVoice = null;
let activeBtn = null;
let currentAudio = null;
// Set to false to disable Google TTS and use system voice only (offline mode)
let useGoogleTTS = true;

// Preferred system voices in priority order (most natural first)
const PREFERRED_VOICES = [
  'Google 日本語',        // Chrome desktop - very natural
  'Kyoko',                // macOS/iOS - excellent
  'Otoya',                // macOS/iOS male - excellent
  'O-ren',                // macOS premium
  'Hattori',              // macOS premium
  'Microsoft Nanami',     // Windows 10/11 - good
  'Microsoft Keita',      // Windows 10/11 male
  'Microsoft Ayumi',      // Windows
  'Microsoft Haruka',     // Windows older
  'Microsoft Ichiro',     // Windows older
];

function pickBestVoice(voices) {
  const ja = voices.filter(v => v.lang && (v.lang === 'ja-JP' || v.lang.startsWith('ja')));
  // Try each preferred voice in order
  for (const pref of PREFERRED_VOICES) {
    const match = ja.find(v => v.name.includes(pref));
    if (match) return match;
  }
  // Else prefer non-default and local voices
  return ja.find(v => v.localService) || ja[0] || null;
}

function loadVoices() {
  const voices = window.speechSynthesis.getVoices();
  japaneseVoice = pickBestVoice(voices);
  updateVoiceNote();
}

function updateVoiceNote() {
  const note = document.getElementById('ttsNote');
  if (!note) return;
  if (useGoogleTTS) {
    note.textContent = 'Giọng: Google Neural (cần mạng)';
  } else if (japaneseVoice) {
    note.textContent = `Giọng hệ thống: ${japaneseVoice.name.slice(0, 30)}`;
  } else {
    note.textContent = 'Giọng mặc định';
  }
}

if (window.speechSynthesis) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function stopAllAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.src = '';
    currentAudio = null;
  }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

function speakWithGoogle(text, btn, onFail) {
  // Google Translate TTS endpoint - returns MP3 audio
  // Note: 'tl' = target language. 'client=tw-ob' is the unauthenticated client used by Google Translate's web UI
  const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=ja&client=tw-ob`;
  const audio = new Audio(url);
  audio.playbackRate = 0.9;
  currentAudio = audio;
  let failed = false;
  audio.addEventListener('ended', () => {
    btn.innerHTML = SPEAK_ICON;
    btn.classList.remove('speaking');
    if (activeBtn === btn) activeBtn = null;
    if (currentAudio === audio) currentAudio = null;
  });
  audio.addEventListener('error', () => {
    failed = true;
    if (currentAudio === audio) currentAudio = null;
    if (onFail) onFail();
  });
  audio.play().catch(() => {
    if (!failed && onFail) onFail();
  });
}

function speakWithSystem(text, btn) {
  if (!window.speechSynthesis) {
    btn.innerHTML = SPEAK_ICON;
    btn.classList.remove('speaking');
    if (activeBtn === btn) activeBtn = null;
    return;
  }
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  if (japaneseVoice) utter.voice = japaneseVoice;
  utter.rate = 0.85;
  utter.onend = utter.onerror = () => {
    btn.innerHTML = SPEAK_ICON;
    btn.classList.remove('speaking');
    if (activeBtn === btn) activeBtn = null;
  };
  window.speechSynthesis.speak(utter);
}

function speak(text, btn) {
  stopAllAudio();
  if (activeBtn) { activeBtn.innerHTML = SPEAK_ICON; activeBtn.classList.remove('speaking'); }
  if (activeBtn === btn) { activeBtn = null; return; }
  btn.innerHTML = STOP_ICON;
  btn.classList.add('speaking');
  activeBtn = btn;
  if (useGoogleTTS) {
    speakWithGoogle(text, btn, () => {
      // Tier 1 failed → fallback to Tier 2
      speakWithSystem(text, btn);
    });
  } else {
    speakWithSystem(text, btn);
  }
}

function handleSpeak(text, id) {
  const btn = document.getElementById(id);
  if (btn) speak(text, btn);
}

function toggleVoiceMode() {
  useGoogleTTS = !useGoogleTTS;
  stopAllAudio();
  if (activeBtn) { activeBtn.innerHTML = SPEAK_ICON; activeBtn.classList.remove('speaking'); activeBtn = null; }
  updateVoiceNote();
  const toggle = document.getElementById('voiceToggle');
  if (toggle) toggle.textContent = useGoogleTTS ? '🌐 Online (chất lượng cao)' : '💾 Offline (hệ thống)';
}

const units = [...new Set(vocab.map(v => v.unit))].sort((a,b)=>a-b);
const unitTopics = {};
vocab.forEach(v => { if(!unitTopics[v.unit]) unitTopics[v.unit] = v.topic; });

// Index: for each kanji character → list of words containing it, sorted by unit ascending.
// Used by the stroke-order popup to surface earlier-bài words for reinforcement.
const kanjiIndex = {};
vocab.forEach(v => {
  if (!v.kanji) return;
  const seen = new Set();
  for (const ch of v.kanji) {
    const cp = ch.codePointAt(0);
    if (cp < 0x4E00 || cp > 0x9FFF) continue;
    if (seen.has(ch)) continue; // avoid duplicate when a kanji appears twice in same word
    seen.add(ch);
    if (!kanjiIndex[ch]) kanjiIndex[ch] = [];
    kanjiIndex[ch].push(v);
  }
});
// Sort each kanji's word list by unit ascending, then by occurrence order
Object.keys(kanjiIndex).forEach(k => {
  kanjiIndex[k].sort((a, b) => a.unit - b.unit);
});

const sel = document.getElementById('unitSelect');
units.forEach(u => {
  const opt = document.createElement('option');
  opt.value = u; opt.textContent = `Bài ${u}`; sel.appendChild(opt);
});

function hl(text, q) {
  if (!q || !text) return text;
  const e = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(e, 'gi'), m => `<mark>${m}</mark>`);
}

// Wrap each CJK kanji character in a hoverable span (skip hiragana/katakana/punctuation)
// `currentUnit` lets the popup know which bài this kanji appears in, so it can
// surface earlier-bài words for reinforcement.
function wrapKanji(text, currentUnit) {
  if (!text) return '';
  let out = '';
  for (const ch of text) {
    const cp = ch.codePointAt(0);
    // CJK Unified Ideographs: 0x4E00-0x9FFF (covers all common kanji)
    if (cp >= 0x4E00 && cp <= 0x9FFF) {
      out += `<span class="kanji-char" data-char="${ch}" data-unit="${currentUnit}">${ch}</span>`;
    } else {
      out += ch;
    }
  }
  return out;
}

// Combine highlight + kanji wrapping. Highlight uses <mark> which we apply after wrapping.
function renderKanjiCell(text, q, currentUnit) {
  const wrapped = wrapKanji(text, currentUnit);
  if (!q) return wrapped;
  // Apply highlight but skip inside HTML tags
  const e = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(e, 'gi');
  return wrapped.replace(/>([^<]+)</g, (m, content) => {
    return '>' + content.replace(re, x => `<mark>${x}</mark>`) + '<';
  });
}

function renderAll() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const u = document.getElementById('unitSelect').value;
  stopAllAudio();
  if (activeBtn) { activeBtn.innerHTML = SPEAK_ICON; activeBtn.classList.remove('speaking'); activeBtn = null; }

  const filtered = vocab.filter(v => {
    const mu = !u || v.unit == u;
    const mq = !q || [v.hira, v.kanji, v.hanviet, v.viet].some(f => f.toLowerCase().includes(q));
    return mu && mq;
  });
  document.getElementById('stats').textContent = `${filtered.length} từ`;

  const grouped = {};
  filtered.forEach(v => { if (!grouped[v.unit]) grouped[v.unit] = []; grouped[v.unit].push(v); });

  if (!filtered.length) { document.getElementById('content').innerHTML = '<div class="empty">Không tìm thấy từ nào</div>'; return; }

  let html = '';
  Object.keys(grouped).sort((a,b)=>+a-+b).forEach(unit => {
    const words = grouped[unit];
    html += `<div class="unit-section"><div class="unit-header">
      <span class="unit-badge">Bài ${unit}</span>
      <span class="unit-title">${unitTopics[unit]||''}</span>
      <span class="unit-count">${words.length} từ</span>
    </div>
    <table><thead><tr><th>Hiragana</th><th>Kanji</th><th>Hán Việt</th><th>Nghĩa tiếng Việt</th></tr></thead><tbody>`;
    words.forEach((v, i) => {
      const id = `b_${unit}_${i}`;
      html += `<tr${v.isNew?' class="new-word"':''}>
        <td><div class="hira-cell">
          <button class="speak-btn" id="${id}" onclick="handleSpeak('${v.hira.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}','${id}')" title="Phát âm">${SPEAK_ICON}</button>
          <span class="hira-text">${hl(v.hira,q)}</span>
        </div></td>
        <td class="kanji">${renderKanjiCell(v.kanji,q,v.unit)}</td>
        <td class="hanviet">${hl(v.hanviet,q)}</td>
        <td class="viet">${hl(v.viet,q)}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });
  document.getElementById('content').innerHTML = html;
}

// ===== Kanji stroke order popup =====
// Stroke path data is embedded directly (no network needed) from KanjiVG via @madcat/kanjivg.
// KANJI_DATA is defined below as { '安': ['M53.06,13.73...', ...], ... }
const popup = document.createElement('div');
popup.className = 'stroke-popup';
document.body.appendChild(popup);

let currentChar = null;
let hideTimer = null;

function positionPopup(targetEl) {
  const r = targetEl.getBoundingClientRect();
  // Approximate dimensions - real popup may be taller with related words
  const pw = 220;
  // Use actual popup height after content settles
  const ph = popup.offsetHeight || 200;
  let left = r.left + r.width / 2 - pw / 2;
  let top = r.bottom + 6;
  if (top + ph > window.innerHeight - 10) top = Math.max(8, r.top - ph - 6);
  left = Math.max(8, Math.min(window.innerWidth - pw - 8, left));
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
}

function showPopup(ch, fromUnit) {
  const paths = KANJI_DATA[ch];
  if (!paths) {
    popup.innerHTML = `<div class="error">Không có dữ liệu<br>cho ${ch}</div>`;
    return;
  }
  const STROKE_DURATION = 0.5; // seconds per stroke
  let pathsHtml = '';
  paths.forEach((d, i) => {
    pathsHtml += `<path class="stroke-path" d="${d}" style="animation-delay:${i * STROKE_DURATION}s; animation-duration:${STROKE_DURATION}s;"/>`;
  });

  // Build "related earlier words" section: words in earlier bài (or same bài, different word) that contain this kanji
  const allWithKanji = kanjiIndex[ch] || [];
  const fromUnitNum = parseInt(fromUnit) || 999;
  // Show: words from strictly EARLIER units, plus other words in same unit
  const earlier = allWithKanji.filter(v => v.unit < fromUnitNum);
  let relatedHtml = '';
  if (earlier.length > 0) {
    const items = earlier.slice(0, 6).map(v => {
      const display = v.kanji || v.hira;
      const meaning = v.viet.length > 18 ? v.viet.slice(0, 17) + '…' : v.viet;
      return `<div class="related-item"><span class="related-badge">B${v.unit}</span><span class="related-word">${display}</span><span class="related-meaning">${meaning}</span></div>`;
    }).join('');
    const more = earlier.length > 6 ? `<div class="related-more">+${earlier.length - 6} từ khác</div>` : '';
    relatedHtml = `<div class="related-section"><div class="related-title">Đã học trước đó:</div>${items}${more}</div>`;
  }

  popup.innerHTML = `
    <div class="stroke-frame">
      <svg viewBox="0 0 109 109" xmlns="http://www.w3.org/2000/svg">${pathsHtml}</svg>
    </div>
    <div class="char-label">${ch} · ${paths.length} nét</div>
    ${relatedHtml}
  `;
  // Set dasharray per path based on actual path length so the stroke draws cleanly
  popup.querySelectorAll('.stroke-path').forEach(p => {
    try {
      const len = p.getTotalLength();
      p.style.setProperty('--len', len);
    } catch(e) {}
  });
}

function handleKanjiHover(targetEl) {
  const ch = targetEl.dataset.char;
  const fromUnit = targetEl.dataset.unit;
  if (!ch) return;
  if (currentChar === ch && popup.classList.contains('visible')) {
    positionPopup(targetEl);
    return;
  }
  currentChar = ch;
  popup.classList.add('visible');
  showPopup(ch, fromUnit);
  // Position after content rendered (height may have changed)
  positionPopup(targetEl);
  requestAnimationFrame(() => positionPopup(targetEl));
}

function hidePopup() {
  currentChar = null;
  popup.classList.remove('visible');
}

document.getElementById('content').addEventListener('mouseover', e => {
  const el = e.target.closest('.kanji-char');
  if (el) {
    clearTimeout(hideTimer);
    handleKanjiHover(el);
  }
});
document.getElementById('content').addEventListener('mouseout', e => {
  const el = e.target.closest('.kanji-char');
  if (el) {
    hideTimer = setTimeout(hidePopup, 150);
  }
});
document.getElementById('content').addEventListener('click', e => {
  const el = e.target.closest('.kanji-char');
  if (el && window.matchMedia('(max-width: 600px)').matches) {
    if (currentChar === el.dataset.char && popup.classList.contains('visible')) {
      hidePopup();
    } else {
      handleKanjiHover(el);
    }
    e.stopPropagation();
  }
});
document.addEventListener('click', () => {
  if (popup.classList.contains('visible') && window.matchMedia('(max-width: 600px)').matches) {
    hidePopup();
  }
});
</script>
